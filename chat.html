<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="app-container">

    <!-- LEFT PANEL: Document Management -->
    <div id="doc-panel">
      <h2 class="panel-title">Document Management</h2>

      <form id="upload-form">
        <label class="section-label">Upload Document</label>
        <div class="file-row">
          <input type="file" id="file-input" accept=".pdf,.doc,.docx,.txt,.md" />
        </div>
        <button type="button" id="upload-btn">Upload</button>
      </form>

      <div class="divider"></div>

      <div class="docs-section">
        <label class="section-label">Uploaded Documents</label>
        <div id="uploaded-docs">
          <p class="empty-msg">No documents uploaded yet</p>
        </div>
      </div>

      <div class="divider"></div>

      <div class="retrieval-section">
        <label class="section-label" for="retrieval-method">Retrieval Method</label>
        <select id="retrieval-method">
          <option value="semantic">Semantic (Embeddings)</option>
          <option value="tfidf">TF-IDF (Keyword)</option>
        </select>
      </div>
    </div>

    <!-- RIGHT PANEL: AI Chat -->
    <div id="chat-container">
      <h2 class="panel-title">AI Chat</h2>

      <div id="messages"></div>

      <div class="chat-footer">
        <input
          type="text"
          id="user-input"
          placeholder="Begin chatting..."
          autocomplete="off"
        />
        <button id="send-btn">Send</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
